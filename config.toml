baseURL = "https://showme.codes"
locale = "en-us"
title = "翟志军 Jack Zhai"
copyright = "showme.codes"
theme = "PaperMod"
googleAnalytics = "ca-pub-4241921911679368"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true  # allow raw HTML embedded in posts to render
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = false
    style = "perldoc"
    tabWidth = 4

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]  # JSON output enables PaperMod's search

[params]
  env = "production"  # enables GA, OpenGraph, Twitter cards in production builds
  description = "Everything as Code"
  keywords = ["Blog", "DevOps", "Software Engineering"]
  author = "翟志军 Jack Zhai"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"  # auto / light / dark
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true

  # Sections shown on the home page and in the post count
  mainSections = ["zh-cn", "en"]

  [params.footer]
    text = "🔗 友情链接：[Xascade](https://xascade.com)"

  [params.homeInfoParams]
    Title = "翟志军 Jack Zhai 👋"
    Content = """
软件工程师，10 年+ 经验：5 年 Java 后端开发 + 5 年 DevOps / SRE 实践。

📖 《Jenkins 2.x 实践指南》作者（销量 5000+）。自 2015 年笔耕至今，已写下 120+ 篇文章。

✍️ 这里记录我对 **DevOps、SRE、Cloud Native、持续交付、领域驱动设计（DDD）** 以及 **职场成长** 的思考与实践。信奉 *Everything as Code*。
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/zacker330"
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[[menu.main]]
  identifier = "about"
  name = "About Me"
  url = "/about-me"
  weight = 1
[[menu.main]]
  identifier = "zh"
  name = "中文"
  url = "/zh-cn/"
  weight = 2
[[menu.main]]
  identifier = "en"
  name = "English"
  url = "/en/"
  weight = 3
[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 4
[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 5
